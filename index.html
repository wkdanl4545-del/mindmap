<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마인드맵</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== 로그인 화면 ===== -->
<div id="login-view" class="view">
  <form id="login-form" class="login-box">
    <h1>마인드맵 로그인</h1>
    <label>아이디</label>
    <input type="text" id="login-id" autocomplete="username" required>
    <label>비밀번호</label>
    <input type="password" id="login-pw" autocomplete="current-password" required>
    <label class="login-remember"><input type="checkbox" id="login-remember" checked> 자동 로그인 (이 브라우저에서 다시 묻지 않기)</label>
    <div id="login-error" class="login-error hidden">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    <button type="submit" class="btn primary login-submit">로그인</button>
  </form>
</div>

<!-- ===== 홈 화면: 프로젝트 목록 ===== -->
<div id="home-view" class="view hidden">
  <header class="home-header">
    <h1>마인드맵</h1>
    <div class="home-actions">
      <button id="btn-new-folder">📁 새 폴더</button>
      <button id="btn-new-project" class="btn primary">+ 새 프로젝트</button>
      <label class="btn" for="file-import-home">파일에서 열기</label>
      <input type="file" id="file-import-home" accept=".json,application/json" hidden>
      <button id="btn-logout" title="로그아웃">로그아웃</button>
    </div>
  </header>
  <div id="folder-breadcrumb" class="breadcrumb"></div>
  <div id="project-list" class="project-list"></div>
</div>

<!-- ===== 에디터 화면 ===== -->
<div id="editor-view" class="view hidden">
  <div class="toolbar">
    <div class="toolbar-main">
      <div class="toolbar-group">
        <button id="btn-home" title="홈으로">🏠</button>
        <input id="project-name" class="project-name-input" />
        <button id="btn-save" title="저장 (Ctrl+S)">💾<span class="btn-label"> 저장</span></button>
      </div>

      <div class="toolbar-group">
        <button id="btn-add-child" title="자식 노드 추가 (Tab)">➕<span class="btn-label"> 자식</span></button>
        <button id="btn-add-sibling" title="형제 노드 추가 (Enter)">➕<span class="btn-label"> 형제</span></button>
        <button id="btn-delete-node" title="삭제 (Delete)">🗑<span class="btn-label"> 삭제</span></button>
        <button id="btn-undo" title="실행취소 (Ctrl+Z)">↶</button>
        <button id="btn-redo" title="다시실행 (Ctrl+Y)">↷</button>
      </div>

      <button id="btn-toolbar-more" title="더보기">⋯<span class="btn-label"> 더보기</span></button>
    </div>

    <div id="toolbar-extra" class="toolbar-extra">
      <div class="toolbar-group">
        <span class="toolbar-label">배경</span>
        <button id="btn-color-none" class="swatch-none" title="색 없음">∅</button>
        <div id="color-swatches" class="swatches"></div>
        <input type="color" id="color-custom" title="커스텀 배경색">
        <select id="shape-select" title="노드 모양">
          <option value="rounded">둥근 사각</option>
          <option value="rect">사각</option>
          <option value="pill">필 모양</option>
          <option value="ellipse">타원</option>
          <option value="none">박스 없음</option>
        </select>
      </div>

      <div class="toolbar-group">
        <span class="toolbar-label">테두리</span>
        <button id="btn-border-none" class="swatch-none" title="테두리 없음">∅</button>
        <input type="color" id="border-custom" title="테두리 색상">
        <select id="border-width-select" title="테두리 두께">
          <option value="1">얇게</option>
          <option value="2" selected>보통</option>
          <option value="3">굵게</option>
          <option value="5">아주 굵게</option>
        </select>
      </div>

      <div class="toolbar-group">
        <span class="toolbar-label">글자</span>
        <select id="font-family-select" title="글씨체">
          <option value="'Segoe UI', 'Malgun Gothic', sans-serif">기본</option>
          <option value="'Malgun Gothic', sans-serif">맑은 고딕</option>
          <option value="'Gungsuh', serif">궁서</option>
          <option value="'Dotum', sans-serif">돋움</option>
          <option value="'Batang', serif">바탕</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="'Courier New', monospace">고정폭(monospace)</option>
          <option value="'Comic Sans MS', cursive">손글씨체</option>
        </select>
        <button id="btn-bold" title="굵게">B</button>
        <button id="btn-font-minus" title="글자 작게">A-</button>
        <button id="btn-font-plus" title="글자 크게">A+</button>
        <button id="btn-align-left" title="왼쪽 정렬">⬅</button>
        <button id="btn-align-center" title="가운데 정렬">↔</button>
        <button id="btn-align-right" title="오른쪽 정렬">➡</button>
      </div>

      <div class="toolbar-group">
        <button id="btn-icon" title="아이콘 삽입">😀<span class="btn-label"> 아이콘</span></button>
        <label class="btn" for="file-image-input" title="이미지 삽입">🖼<span class="btn-label"> 이미지</span></label>
        <input type="file" id="file-image-input" accept="image/*" hidden>
        <button id="btn-theme" title="테마">🎨<span class="btn-label"> 테마</span></button>
        <select id="line-style-select" title="연결선 모양">
          <option value="elbow">꺾인선</option>
          <option value="curved">곡선</option>
          <option value="bracket">브래킷형</option>
        </select>
        <button id="btn-auto-arrange" title="자동 정렬">🧹<span class="btn-label"> 자동 정렬</span></button>
      </div>

      <div class="toolbar-group toolbar-right">
        <button id="btn-save-as">📑<span class="btn-label"> 다른 이름으로 저장</span></button>
        <button id="btn-export-json">💾<span class="btn-label"> 내보내기(JSON)</span></button>
        <label class="btn" for="file-import-editor">📂<span class="btn-label"> 가져오기</span></label>
        <input type="file" id="file-import-editor" accept=".json,application/json" hidden>
        <button id="btn-export-png">PNG</button>
        <button id="btn-export-pdf">PDF</button>
        <button id="btn-share">🔗<span class="btn-label"> 공유 링크</span></button>
      </div>
    </div>
  </div>

  <div id="canvas-wrap">
    <svg id="lines-layer"></svg>
    <div id="nodes-layer"></div>
  </div>

  <div id="zoom-controls">
    <button id="btn-zoom-out">−</button>
    <span id="zoom-level">100%</span>
    <button id="btn-zoom-in">+</button>
    <button id="btn-zoom-reset">⤢ 전체보기</button>
  </div>
</div>

<!-- 아이콘 선택 팝업 -->
<div id="icon-popup" class="popup hidden"></div>

<!-- 테마 갤러리 팝업 -->
<div id="theme-popup" class="popup theme-popup hidden"></div>

<!-- 우클릭(롱프레스) 컨텍스트 메뉴 -->
<div id="context-menu" class="context-menu hidden"></div>

<!-- 저장 등 알림용 토스트 -->
<div id="toast" class="toast hidden"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
